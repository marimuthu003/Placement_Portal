{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 0 auto; box-shadow: 0 10px 40px rgba(0,0,0,0.1);">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h2 style="color: var(--primary); font-size: 2rem;">Welcome Back</h2>
        <p style="color: var(--text-light);">Log in to your account</p>
    </div>
    
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.8rem; font-size: 1.1rem;">Login</button>
    </form>
</div>
{% endblock %}
